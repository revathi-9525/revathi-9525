name: Generate Snake

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
permissions:
  contents: write

steps:
  - uses: Platane/snk@v3
    with:
      github_user_name: revathi-9525
      outputs: dist/github-contribution-grid-snake.svg

  - uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
